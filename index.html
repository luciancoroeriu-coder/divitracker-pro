<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DiviTracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #34c759; --text: #fff; --muted: #8e8e93; --border: #2c2c2e; --blue: #007aff; --red: #ff3b30; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        .header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; }
        .lang-select { background: #1e1e1e; color: #fff; border: 1px solid var(--border); padding: 5px; border-radius: 5px; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; display: none; }
        .container.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        input { background: #1e1e1e; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }

        .btn-calc { background: var(--accent); color: #000; font-weight: 800; padding: 15px; border: none; border-radius: 10px; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-reset { background: none; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-size: 12px; cursor: pointer; }

        .res-box { display: none; margin-top: 20px; }
        .chart-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 10px; margin-bottom: 15px; height: 250px; position: relative; }
        
        .summary-item { background: #1c1c1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .val-big { font-size: 28px; font-weight: 900; color: var(--accent); }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: #121212; border-top: 1px solid var(--border); display: flex; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); font-size: 10px; font-weight: bold; }
        .tab-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800;">Divi<span style="color:var(--accent)">Tracker</span> Pro</div>
        <select class="lang-select" id="lang" onchange="updateLang(this.value)">
            <option value="en">🇺🇸 EN</option>
            <option value="ro">🇷🇴 RO</option>
        </select>
    </div>

    <div id="div_tab" class="container active">
        <div class="card">
            <div class="grid">
                <div><label id="lp">Price ($)</label><input type="number" id="p" value="27"></div>
                <div><label id="ls">Shares</label><input type="number" id="s" value="250"></div>
            </div>
            <div class="grid">
                <div><label id="ly">Yield (%)</label><input type="number" id="y" value="4"></div>
                <div><label id="la">Years</label><input type="number" id="a" value="10"></div>
            </div>
            <div class="grid">
                <div><label id="lc">Contrib ($)</label><input type="number" id="c" value="1200"></div>
                <div><label id="lt">Tax (%)</label><input type="number" id="t" value="10"></div>
            </div>
            <button class="btn-calc" id="bcalc" onclick="calculate()">CALCULATE</button>
            <button class="btn-reset" id="breset" onclick="hardReset()">RESET ALL DATA</button>
        </div>

        <div id="res_box" class="res-box">
            <div class="summary-item">
                <label id="lvf">FINAL VALUE</label>
                <div class="val-big" id="v_final">$0.00</div>
            </div>

            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>

            <div class="summary-item" style="border-left-color: var(--blue);">
                <label id="lvi">INVESTED</label>
                <div id="v_inv" style="font-weight:bold; font-size: 20px;">$0</div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active">💰 <span id="t1">DIVIDENDS</span></div>
    </nav>

    <script>
        let myChart = null;

        function updateLang(lang) {
            const texts = {
                en: { lp:"Price ($)", ls:"Shares", ly:"Yield (%)", la:"Years", lc:"Contrib ($)", lt:"Tax (%)", bcalc:"CALCULATE", breset:"RESET ALL DATA", lvf:"FINAL VALUE", lvi:"INVESTED", t1:"DIVIDENDS" },
                ro: { lp:"Preț Acțiune", ls:"Acțiuni", ly:"Randament (%)", la:"Ani", lc:"Depunere Anuală", lt:"Impozit (%)", bcalc:"CALCULEAZĂ", breset:"RESETEAZĂ TOT", lvf:"VALOARE FINALĂ", lvi:"BANI INVESTIȚI", t1:"DIVIDENDE" }
            };
            const d = texts[lang];
            for (let id in d) { document.getElementById(id).innerText = d[id]; }
        }

        // RESETARE BRUTALĂ
        function hardReset() {
            // Valorile implicite
            document.getElementById('p').value = 27;
            document.getElementById('s').value = 250;
            document.getElementById('y').value = 4;
            document.getElementById('a').value = 10;
            document.getElementById('c').value = 1200;
            document.getElementById('t').value = 10;
            
            // Ascundem rezultatele
            document.getElementById('res_box').style.display = 'none';
            
            // Distrugem graficul vechi
            if(myChart) {
                myChart.destroy();
                myChart = null;
            }
            window.scrollTo(0,0);
        }

        function calculate() {
            const p = parseFloat(document.getElementById('p').value);
            const s = parseFloat(document.getElementById('s').value);
            const y = parseFloat(document.getElementById('y').value)/100;
            const a = parseInt(document.getElementById('a').value);
            const c = parseFloat(document.getElementById('c').value);
            const t = parseFloat(document.getElementById('t').value)/100;

            let curS = s, val = p * s, inv = p * s;
            let dataVal = [], labels = [];

            for(let i=1; i<=a; i++) {
                inv += c;
                curS += (c / p); // adaugam actiuni din contributie
                let divNet = (curS * p * y) * (1 - t);
                curS += (divNet / p); // reinvestire
                val = curS * p;
                
                labels.push("Year " + i);
                dataVal.push(val.toFixed(0));
            }

            document.getElementById('v_final').innerText = "$" + val.toLocaleString();
            document.getElementById('v_inv').innerText = "$" + inv.toLocaleString();
            document.getElementById('res_box').style.display = 'block';

            // GENERARE GRAFIC
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('chart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Portfolio',
                        data: dataVal,
                        borderColor: '#34c759',
                        backgroundColor: 'rgba(52, 199, 89, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { ticks: { color: '#8e8e93' }, grid: { color: '#2c2c2e' } },
                        x: { ticks: { color: '#8e8e93' }, grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
