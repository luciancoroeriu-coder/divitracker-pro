<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>DiviTracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --stone: #2a2a2a;
            --stone-light: #3d3d3d;
            --neon-green: #34c759;
            --neon-glow: rgba(52, 199, 89, 0.4);
            --text-gold: #d4af37;
            --bg-texture: radial-gradient(circle, #444 1px, transparent 1px), #222;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-texture);
            background-size: 20px 20px;
            color: #eee;
            margin: 0;
            padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER stil Beton */
        .header {
            padding: 50px 20px 15px;
            background: linear-gradient(145.1deg, #333 0%, #111 100%);
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; display: none; }
        .container.active { display: block; }

        /* Cardul tip Beton Săpat */
        .card {
            background: #2a2a2a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 2px 2px 5px #111, inset -2px -2px 5px #444, 5px 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        /* Input-uri "Săpate" în piatră */
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        input, select {
            background: #1e1e1e;
            color: var(--text-gold);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: inset 3px 3px 6px #000, inset -1px -1px 3px #444;
            outline: none;
        }

        /* Butonul NEON CALCULATE */
        .btn-calc {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            color: #fff;
            font-weight: 900;
            padding: 18px;
            border: none;
            border-radius: 12px;
            width: 100%;
            font-size: 16px;
            text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-glow);
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-calc:active { transform: scale(0.98); box-shadow: 0 0 5px var(--neon-glow); }

        /* Display Rezultat Neon */
        .res-display {
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 20px var(--neon-glow), inset 0 0 10px var(--neon-glow);
            margin-top: 20px;
        }
        .val-main { font-size: 32px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        .chart-wrap { height: 350px; margin-top: 20px; background: #111; border-radius: 10px; padding: 10px; border: 1px solid #333; }

        /* TAB BAR */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: #1a1a1a; display: flex; border-top: 2px solid #333; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 10px; font-weight: bold; }
        .tab-item.active { color: var(--neon-green); }
        .tab-item i { font-size: 20px; margin-bottom: 5px; }

        .info-box { font-size: 11px; color: #aaa; margin-top: 10px; text-align: center; }
        .table-wrap { overflow-x: auto; margin-top: 20px; border-radius: 10px; background: #111; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #222; color: #888; padding: 10px; text-align: right; }
        td { padding: 10px; text-align: right; border-bottom: 1px solid #222; color: #ddd; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; letter-spacing: -1px; font-size: 20px;">DIVITRACKER <span style="color:var(--neon-green)">PRO</span></div>
    <select id="lang" style="width: auto; padding: 5px;" onchange="updateLang()">
        <option value="ro">🇷🇴 RO</option>
        <option value="en">🇺🇸 EN</option>
    </select>
</div>

<div id="div_tab" class="container active">
    <div class="card">
        <div class="grid">
            <div><label id="l_p">Preț</label><input type="number" id="p" value="100" oninput="quickSum()"></div>
            <div><label id="l_s">Acțiuni</label><input type="number" id="s" value="200" oninput="quickSum()"></div>
        </div>
        <div class="info-box" id="l_initial">Investiție Inițială: <span id="init_val" style="color:var(--neon-green)">$20.000</span></div>
        <br>
        <div class="grid">
            <div><label id="l_y">Yield %</label><input type="number" id="y" value="4"></div>
            <div><label id="l_a">Ani</label><input type="number" id="a" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_dg">Creșt. Div %</label><input type="number" id="dg" value="5"></div>
            <div><label id="l_pg">Creșt. Preț %</label><input type="number" id="pg" value="7"></div>
        </div>
        <div class="grid">
            <div><label id="l_c">Depunere Anuală</label><input type="number" id="c" value="1200"></div>
            <div><label id="l_t">Impozit %</label><input type="number" id="t" value="10"></div>
        </div>
        <select id="drip" style="margin-bottom: 15px;">
            <option value="yes">REINVESTEȘTE (DRIP ON)</option>
            <option value="no">SCOATE CASH (DRIP OFF)</option>
        </select>
        <button class="btn-calc" onclick="calcDiv()">Calculează Profitul</button>
    </div>

    <div id="res_div" style="display:none;">
        <div class="res-display">
            <label id="l_final_val">Valoare Finală Portofoliu</label>
            <div class="val-main" id="v_final">$0</div>
            <div id="v_extra" style="font-size: 12px; color: #888; margin-top: 5px;"></div>
        </div>
        <div class="chart-wrap"><canvas id="chartDiv"></canvas></div>
        <div class="table-wrap">
            <table>
                <thead><tr id="th_div"><th>An</th><th>Acțiuni</th><th>Preț</th><th>Dividend</th><th>Sold</th></tr></thead>
                <tbody id="tb_div"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="comp_tab" class="container">
    <div class="card">
        <label id="l_cp">Depozit Inițial</label>
        <input type="number" id="cp" value="10000">
        <br>
        <label id="l_cm">Depunere Lunară</label>
        <input type="number" id="cm" value="500">
        <br>
        <div class="grid">
            <div><label id="l_cr">Dobândă Anuală %</label><input type="number" id="cr" value="8"></div>
            <div><label id="l_ct">Impozit pe Profit %</label><input type="number" id="ct" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_ca">Ani</label><input type="number" id="ca" value="15"></div>
            <div><label id="l_cf">Frecvență</label>
                <select id="cfreq">
                    <option value="12">Lunar</option>
                    <option value="1">Anual</option>
                </select>
            </div>
        </div>
        <button class="btn-calc" style="background: linear-gradient(145deg, #0d47a1, #1565c0);" onclick="calcComp()">Calculează Creșterea</button>
    </div>

    <div id="res_comp" style="display:none;">
        <div class="res-display" style="border-color: #007aff; box-shadow: 0 0 20px rgba(0,122,255,0.4);">
            <label>Balanță Finală (Netă)</label>
            <div class="val-main" id="cv_final" style="color: #007aff; text-shadow: 0 0 10px #007aff;">$0</div>
            <div id="cv_tax_info" style="font-size: 11px; color: #ff3b30; margin-top:5px;"></div>
        </div>
        <div class="chart-wrap"><canvas id="chartComp"></canvas></div>
        
        <div class="grid" style="margin-top:15px;">
            <div class="card" style="padding:10px; text-align:center;">
                <label>Investiție Totală</label>
                <div id="cv_total_inv" style="font-weight:bold; color:#007aff;">$0</div>
            </div>
            <div class="card" style="padding:10px; text-align:center;">
                <label>Câștig Net</label>
                <div id="cv_total_profit" style="font-weight:bold; color:var(--neon-green);">$0</div>
            </div>
        </div>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="showT('div', this)">💰 <div id="m_div">DIVIDENDE</div></div>
    <div class="tab-item" onclick="showT('comp', this)">📈 <div id="m_comp">DOBÂNDĂ</div></div>
</nav>

<script>
let dChart = null, cChart = null;

function showT(t, el) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'_tab').classList.add('active');
    el.classList.add('active');
}

function quickSum() {
    let p = document.getElementById('p').value;
    let s = document.getElementById('s').value;
    document.getElementById('init_val').innerText = "$" + (p * s).toLocaleString();
}

function calcDiv() {
    let p = parseFloat(document.getElementById('p').value), s = parseFloat(document.getElementById('s').value);
    let y = parseFloat(document.getElementById('y').value)/100, a = parseInt(document.getElementById('a').value);
    let dg = parseFloat(document.getElementById('dg').value)/100, pg = parseFloat(document.getElementById('pg').value)/100;
    let c = parseFloat(document.getElementById('c').value), t = parseFloat(document.getElementById('t').value)/100;
    let drip = document.getElementById('drip').value === 'yes';

    let curS = s, curP = p, curDiv = p * y, labels = [], data = [], withdrawn = 0;
    let html = '';

    for(let i=1; i<=a; i++) {
        curS += (c / curP);
        let divAnual = curS * curDiv;
        let divNet = divAnual * (1 - t);
        if(drip) curS += (divNet / curP); else withdrawn += divNet;
        curP *= (1 + pg);
        curDiv *= (1 + dg);
        let bal = curS * curP;
        labels.push("An " + i); data.push(Math.round(bal));
        html += `<tr><td>${i}</td><td>${curS.toFixed(1)}</td><td>$${curP.toFixed(0)}</td><td>$${divAnual.toFixed(0)}</td><td>$${Math.round(bal).toLocaleString()}</td></tr>`;
    }

    document.getElementById('tb_div').innerHTML = html;
    document.getElementById('v_final').innerText = "$" + Math.round(data[a-1]).toLocaleString();
    document.getElementById('v_extra').innerText = drip ? "" : "Dividende totale încasate: $" + Math.round(withdrawn).toLocaleString();
    document.getElementById('res_div').style.display = 'block';

    if(dChart) dChart.destroy();
    dChart = new Chart(document.getElementById('chartDiv'), {
        type: 'line',
        data: { labels: labels, datasets: [{ label: 'Portofoliu', data: data, borderColor: '#34c759', backgroundColor: 'rgba(52,199,89,0.1)', fill: true, tension: 0.4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#888' }, grid: { color: '#333' } } } }
    });
}

function calcComp() {
    let p = parseFloat(document.getElementById('cp').value);
    let m = parseFloat(document.getElementById('cm').value);
    let rAnual = parseFloat(document.getElementById('cr').value)/100;
    let tax = parseFloat(document.getElementById('ct').value)/100;
    let ani = parseInt(document.getElementById('ca').value);
    let freq = parseInt(document.getElementById('cfreq').value);

    let labels = [], dDepozit = [], dDepuneri = [], dProfit = [];
    let curTotal = p, totalInvestit = p, totalProfitBrut = 0;

    for(let i=1; i<=ani; i++) {
        let inceputAn = curTotal;
        for(let j=0; j<12; j++) {
            curTotal += m;
            totalInvestit += m;
            if(freq === 12) curTotal *= (1 + rAnual/12);
        }
        if(freq === 1) curTotal *= (1 + rAnual);
        
        let profitAn = curTotal - inceputAn - (m * 12);
        totalProfitBrut += profitAn;
        
        labels.push(2025 + i);
        dDepozit.push(p);
        dDepuneri.push(totalInvestit - p);
        dProfit.push(Math.round(totalProfitBrut * (1 - tax)));
    }

    let profitNet = totalProfitBrut * (1 - tax);
    let balantaFinala = totalInvestit + profitNet;

    document.getElementById('cv_final').innerText = "$" + Math.round(balantaFinala).toLocaleString();
    document.getElementById('cv_total_inv').innerText = "$" + totalInvestit.toLocaleString();
    document.getElementById('cv_total_profit').innerText = "$" + Math.round(profitNet).toLocaleString();
    document.getElementById('cv_tax_info').innerText = "Taxe plătite pe profit: $" + Math.round(totalProfitBrut * tax).toLocaleString();
    document.getElementById('res_comp').style.display = 'block';

    if(cChart) cChart.destroy();
    cChart = new Chart(document.getElementById('chartComp'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                { label: 'Depozit', data: dDepozit, backgroundColor: '#0d47a1' },
                { label: 'Depuneri', data: dDepuneri, backgroundColor: '#1976d2' },
                { label: 'Câștig Net', data: dProfit, backgroundColor: '#34c759' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { 
                legend: { display: true, labels: { color: '#888', font: { size: 10 } } },
                datalabels: { display: false }
            },
            scales: {
                x: { stacked: true, grid: { display: false }, ticks: { color: '#888' } },
                y: { stacked: true, grid: { color: '#222' }, ticks: { color: '#888' } }
            }
        }
    });
}

function updateLang() {
    // Logica de limbi rămâne similară cu cea anterioară
}
</script>
</body>
</html>
