<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
    <title>DiviTracker Pro</title>
    <script src="https://cdn.jsDelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-beton: #1a1a1a;
            --card-beton: #252525;
            --neon-green: #34c759;
            --neon-blue: #007aff;
            --gold: #d4af37;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: radial-gradient(circle at 50% 50%, #333 0%, #1a1a1a 100%);
            background-size: cover; color: #eee; margin: 0; padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            padding: 55px 20px 15px;
            background: linear-gradient(180deg, #222 0%, #000 100%);
            border-bottom: 2px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }

        .container { padding: 15px; max-width: 900px; margin: 0 auto; display: none; }
        .container.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Stil Beton Brut (Săpat/Sculptat) */
        .card {
            background: var(--card-beton);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 
                8px 8px 16px #0d0d0d, 
                -4px -4px 10px #333,
                inset 1px 1px 1px rgba(255,255,255,0.05);
            border: 1px solid #222;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        label { font-size: 9px; color: #777; text-transform: uppercase; font-weight: 900; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
        
        input, select {
            background: #151515; color: var(--gold); border: none; padding: 12px;
            border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box;
            box-shadow: inset 4px 4px 8px #000, inset -1px -1px 2px #333;
            outline: none; font-weight: bold;
        }

        .btn-calc {
            background: linear-gradient(145deg, #2a2a2a, #111);
            color: var(--neon-green); font-weight: 900; padding: 18px;
            border: 2px solid var(--neon-green); border-radius: 12px;
            width: 100%; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 10px rgba(52, 199, 89, 0.2);
        }

        /* Summary Box (Andrei Horciu Style) */
        .res-box {
            border: 2px solid var(--neon-green); background: rgba(0,0,0,0.6);
            border-radius: 20px; padding: 20px; text-align: center; margin: 20px 0;
            box-shadow: 0 0 20px rgba(52, 199, 89, 0.1);
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .summary-item { background: #111; padding: 12px; border-radius: 10px; border: 1px solid #333; }
        .summary-item div { font-size: 15px; font-weight: 800; margin-top: 5px; }

        /* Tabel Complet (TipRanks Style) */
        .table-wrap { overflow-x: auto; background: #000; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 850px; }
        th { background: #181818; color: #666; padding: 15px; border-bottom: 2px solid #333; text-transform: uppercase; }
        td { padding: 14px; text-align: center; border-bottom: 1px solid #111; color: #bbb; }
        .hl { color: var(--neon-green); font-weight: bold; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 1px solid #333; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 800; }
        .tab-item.active { color: var(--neon-green); }
        .tab-item span { font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body onload="updateLang()">

<div class="header">
    <div style="font-weight: 900; font-size: 20px;">DIVITRACKER <span style="color:var(--neon-green)">PRO</span></div>
    <select id="lang" style="width: auto; padding: 5px; border-radius: 10px;" onchange="updateLang()">
        <option value="ro" selected>🇷🇴 RO</option><option value="en">🇺🇸 EN</option>
        <option value="es">🇪🇸 ES</option><option value="fr">🇫🇷 FR</option>
        <option value="de">🇩🇪 DE</option><option value="cn">🇨🇳 CN</option>
    </select>
</div>

<div id="div_tab" class="container active">
    <div class="card">
        <div class="grid">
            <div><label id="l_p">Preț</label><input type="number" id="p" value="100" oninput="liveSum()"></div>
            <div><label id="l_s">Acțiuni</label><input type="number" id="s" value="250" oninput="liveSum()"></div>
        </div>
        <div style="text-align:center; margin-bottom:15px; font-size:12px; color:#777; font-weight: 800;">
            <span id="l_init">INVESTIȚIE INIȚIALĂ:</span> <span id="cur_init" style="color:var(--neon-green); font-size: 16px;">$25.000</span>
        </div>
        <div class="grid">
            <div><label id="l_y">Yield %</label><input type="number" id="y" value="4.4" step="0.1"></div>
            <div><label id="l_a">Ani</label><input type="number" id="a" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_dg">Creșt. Div %</label><input type="number" id="dg" value="5"></div>
            <div><label id="l_pg">Creșt. Preț %</label><input type="number" id="pg" value="7"></div>
        </div>
        <div class="grid">
            <div><label id="l_c">Contrib. Anuală</label><input type="number" id="c" value="1200"></div>
            <div><label id="l_t">Impozit Div %</label><input type="number" id="t" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_df">Compunere</label>
                <select id="dfreq">
                    <option value="4" id="o_q">Trimestrial (4x)</option>
                    <option value="12" id="o_m">Lunar (12x)</option>
                </select>
            </div>
            <div><label id="l_dr">Strategie</label>
                <select id="drip">
                    <option value="yes" id="o_don">ACTIV (DRIP)</option>
                    <option value="no" id="o_doff">LIFESTYLE (CASH)</option>
                </select>
            </div>
        </div>
        <button class="btn-calc" id="b_calc" onclick="calcDiv()">GENEREAZĂ ANALIZA COMPLETĂ</button>
    </div>

    <div id="res_div" style="display:none;">
        <div class="res-box">
            <label id="l_res_final">BALANȚĂ ESTIMATĂ PORTOFOLIU</label>
            <div id="v_final" style="font-size:36px; font-weight:900; color:var(--neon-green);">$0</div>
            <div class="summary-grid">
                <div class="summary-item"><label id="l_tinv">Investit</label><div id="v_total_inv">$0</div></div>
                <div class="summary-item"><label id="l_tdiv">Dividende Net</label><div id="v_total_div" style="color:var(--neon-green);">$0</div></div>
                <div class="summary-item"><label id="l_tpg">Profit Creștere</label><div id="v_total_pg">$0</div></div>
                <div class="summary-item"><label id="l_ttax">Taxe Plătite</label><div id="v_total_tax" style="color:#ff3b30;">$0</div></div>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th id="h1">AN</th><th id="h2">ACȚIUNI</th><th id="h3">DIV/ACȚ</th><th id="h4">DIV. ANUAL</th>
                        <th id="h5">REINVESTIT</th><th id="h6">CONTRIB.</th><th id="h7">PREȚ FINAL</th><th id="h8">SOLD FINAL</th>
                    </tr>
                </thead>
                <tbody id="tb_div"></tbody>
            </table>
        </div>
        <div class="chart-wrap" style="height: 300px; margin-top:20px;"><canvas id="cDiv"></canvas></div>
    </div>
</div>

<div id="comp_tab" class="container">
    <div class="card">
        <label id="l_cp">Depozit Inițial</label><input type="number" id="cp" value="10000">
        <label id="l_cm">Depunere Lunară</label><input type="number" id="cm" value="500">
        <div class="grid">
            <div><label id="l_cr">Dobândă %</label><input type="number" id="cr" value="8"></div>
            <div><label id="l_ct">Impozit Profit %</label><input type="number" id="ct" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_ca">Ani</label><input type="number" id="ca" value="15"></div>
            <div><label id="l_cf">Compunere</label>
                <select id="cfreq">
                    <option value="12" id="opt_m">Lunar (Compus)</option>
                    <option value="1" id="opt_y">Anual (Simplu)</option>
                </select>
            </div>
        </div>
        <button class="btn-calc" style="color:var(--neon-blue); border-color:var(--neon-blue);" id="b_calc2" onclick="calcComp()">CALCULEAZĂ</button>
    </div>
    <div id="res_comp" style="display:none;">
        <div class="res-box" style="border-color:var(--neon-blue);"><label id="l_cfinal">BALANȚĂ NETĂ FINALĂ</label><div id="cv_final" style="font-size:32px; font-weight:900; color:var(--neon-blue);">$0</div></div>
        <div class="chart-wrap" style="height: 300px;"><canvas id="cComp"></canvas></div>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="tab('div', this)"><span>💰</span><div id="m_div">PROIECȚII</div></div>
    <div class="tab-item" onclick="tab('comp', this)"><span>📈</span><div id="m_comp">DOBÂNDĂ</div></div>
</nav>

<script>
let dChart = null, cChart = null;
function tab(t, el) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'_tab').classList.add('active'); el.classList.add('active');
}
function liveSum() {
    let p = document.getElementById('p').value, s = document.getElementById('s').value;
    document.getElementById('cur_init').innerText = "$" + Math.round(p * s).toLocaleString();
}

function calcDiv() {
    let p = parseFloat(document.getElementById('p').value), s = parseFloat(document.getElementById('s').value);
    let y = parseFloat(document.getElementById('y').value)/100, a = parseInt(document.getElementById('a').value);
    let dg = parseFloat(document.getElementById('dg').value)/100, pg = parseFloat(document.getElementById('pg').value)/100;
    let c = parseFloat(document.getElementById('c').value), t = parseFloat(document.getElementById('t').value)/100;
    let df = parseInt(document.getElementById('dfreq').value), drip = document.getElementById('drip').value === 'yes';

    let curS = s, curP = p, dps = p * y, labs = [], vals = [];
    let totInv = p * s, totDNet = 0, totT = 0, dripC = 0, html = '';

    for(let i=1; i<=a; i++) {
        let annBrut = 0;
        for(let f=0; f<df; f++) {
            let pDiv = (curS * (dps / df)); annBrut += pDiv;
            let net = pDiv * (1 - t); totT += (pDiv * t);
            if(drip) { curS += (net / curP); dripC += net; }
        }
        curS += (c / curP); totInv += c; totDNet += (annBrut * (1 - t));
        curP *= (1 + pg); dps *= (1 + dg);
        let bal = curS * curP; labs.push(i); vals.push(Math.round(bal));
        html += `<tr><td>${i}</td><td>${curS.toFixed(1)}</td><td>$${dps.toFixed(2)}</td><td>$${Math.round(annBrut).toLocaleString()}</td><td>$${Math.round(dripC).toLocaleString()}</td><td>$${c.toLocaleString()}</td><td>$${Math.round(curP)}</td><td class="hl">$${Math.round(bal).toLocaleString()}</td></tr>`;
    }
    document.getElementById('tb_div').innerHTML = html;
    document.getElementById('v_final').innerText = "$" + Math.round(vals[a-1]).toLocaleString();
    document.getElementById('v_total_inv').innerText = "$" + Math.round(totInv).toLocaleString();
    document.getElementById('v_total_div').innerText = "$" + Math.round(totDNet).toLocaleString();
    document.getElementById('v_total_pg').innerText = "$" + Math.round(vals[a-1] - totInv - totDNet).toLocaleString();
    document.getElementById('v_total_tax').innerText = "$" + Math.round(totT).toLocaleString();
    document.getElementById('res_div').style.display = 'block';
    if(dChart) dChart.destroy();
    dChart = new Chart(document.getElementById('cDiv'), { type: 'line', data: { labels: labs, datasets: [{ data: vals, borderColor: '#34c759', backgroundColor: 'rgba(52,199,89,0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
}

function calcComp() {
    let p = parseFloat(document.getElementById('cp').value), m = parseFloat(document.getElementById('cm').value);
    let r = parseFloat(document.getElementById('cr').value)/100, tax = parseFloat(document.getElementById('ct').value)/100;
    let ani = parseInt(document.getElementById('ca').value), freq = parseInt(document.getElementById('cfreq').value);
    let labs = [], dDep = [], dMth = [], dProf = [], cur = p, inv = p, pBrut = 0;
    for(let i=1; i<=ani; i++) {
        let sAn = cur;
        for(let j=0; j<12; j++) { cur += m; inv += m; if(freq === 12) cur *= Math.pow(1 + r, 1/12); }
        if(freq === 1) cur *= (1 + r);
        pBrut += (cur - sAn - (m * 12)); labs.push(2026+i); dDep.push(p); dMth.push(inv-p); dProf.push(Math.round(pBrut*(1-tax)));
    }
    document.getElementById('cv_final').innerText = "$" + Math.round(inv + pBrut*(1-tax)).toLocaleString();
    document.getElementById('res_comp').style.display = 'block';
    if(cChart) cChart.destroy();
    cChart = new Chart(document.getElementById('cComp'), { type: 'bar', data: { labels: labs, datasets: [{ label: 'Initial', data: dDep, backgroundColor: '#0d47a1' }, { label: 'Deposit', data: dMth, backgroundColor: '#1976d2' }, { label: 'Profit', data: dProf, backgroundColor: '#34c759' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } } });
}

function updateLang() {
    const l = document.getElementById('lang').value;
    const map = {
        ro: { p:"Preț", s:"Acțiuni", y:"Yield Anual %", a:"Ani", dg:"Creșt. Div %", pg:"Creșt. Preț %", c:"Contrib. Anuală", t:"Impozit Div %", df:"Compunere", dr:"Strategie", bc:"GENEREAZĂ ANALIZA", md:"PROIECȚII", mc:"DOBÂNDĂ", ti:"Investit", dn:"Dividende Net", ap:"Apreciere", tx:"Taxe", rf:"VALOARE ESTIMATĂ", init:"INVESTIȚIE INIȚIALĂ:", cp:"Depozit Inițial", cm:"Depunere Lunară", cr:"Dobândă %", ct:"Impozit Profit %", ca:"Ani", cf:"Compunere", b2:"CALCULEAZĂ", cf1:"BALANȚĂ NETĂ FINALĂ", om:"Lunar (Compus)", oy:"Anual (Simplu)", h1:"AN", h2:"ACȚIUNI", h3:"DIV/ACȚ", h4:"DIV. ANUAL", h5:"REINVESTIT", h6:"CONTRIB.", h7:"PREȚ FINAL", h8:"SOLD FINAL", oq:"Trimestrial (4x)", om_div:"Lunar (12x)", od_on:"ACTIV (DRIP)", od_off:"LIFESTYLE (CASH)" },
        en: { p:"Price", s:"Shares", y:"Yield %", a:"Years", dg:"Div Growth %", pg:"Price Growth %", c:"Ann. Contrib.", t:"Div Tax %", df:"Compounding", dr:"Strategy", bc:"GENERATE ANALYSIS", md:"PROJECTIONS", mc:"COMPOUND", ti:"Invested", dn:"Net Dividends", ap:"Appreciation", tx:"Taxes", rf:"ESTIMATED VALUE", init:"INITIAL INVESTMENT:", cp:"Initial Deposit", cm:"Monthly Contribution", cr:"Interest Rate %", ct:"Profit Tax %", ca:"Years", cf:"Compounding", b2:"CALCULATE", cf1:"FINAL NET BALANCE", om:"Monthly (Compound)", oy:"Yearly (Simple)", h1:"YEAR", h2:"SHARES", h3:"DIV/SHARE", h4:"ANN. DIV", h5:"REINVESTED", h6:"CONTRIB.", h7:"END PRICE", h8:"FINAL BAL", oq:"Quarterly (4x)", om_div:"Monthly (12x)", od_on:"DRIP ON", od_off:"CASH OUT" },
        es: { p:"Precio", s:"Acciones", y:"Rendimiento %", a:"Años", dg:"Crec. Div %", pg:"Crec. Precio %", c:"Contribución", t:"Impuesto %", df:"Compuesto", dr:"Estrategia", bc:"GENERAR ANÁLISIS", md:"PROYECCIONES", mc:"INTERÉS", ti:"Invertido", dn:"Dividendos", ap:"Plusvalía", tx:"Impuestos", rf:"VALOR ESTIMADO", init:"INVERSIÓN INICIAL:", cp:"Depósito Inicial", cm:"Contribución Mensual", cr:"Interés %", ct:"Impuesto %", ca:"Años", cf:"Compuesto", b2:"CALCULAR", cf1:"BALANCE NETO FINAL", om:"Mensual", oy:"Anual", h1:"AÑO", h2:"ACCIONES", h3:"DIV/ACC.", h4:"DIV. ANUAL", h5:"REINVERTIDO", h6:"CONTRIB.", h7:"PRECIO FINAL", h8:"SALDO FINAL", oq:"Trimestral", om_div:"Mensual", od_on:"ACTIVADO", od_off:"EFECTIVO" },
        fr: { p:"Prix", s:"Actions", y:"Rendement %", a:"Années", dg:"Croiss. Div %", pg:"Croiss. Prix %", c:"Contrib. Annuelle", t:"Impôt %", df:"Composition", dr:"Stratégie", bc:"GÉNÉRER ANALYSE", md:"PROJECTIONS", mc:"INTÉRÊT", ti:"Investi", dn:"Dividendes", ap:"Plus-value", tx:"Impôts", rf:"VALEUR ESTIMÉE", init:"INVESTISSEMENT INITIAL:", cp:"Dépôt Initial", cm:"Contribution Mensuelle", cr:"Intérêt %", ct:"Impôt %", ca:"Années", cf:"Composition", b2:"CALCULER", cf1:"SOLDE NET FINAL ESTIMÉ", om:"Mensuel", oy:"Annuel", h1:"ANNÉE", h2:"ACTIONS", h3:"DIV/ACTION", h4:"DIV. ANNUEL", h5:"RÉINVESTI", h6:"CONTRIB.", h7:"PRIX FINAL", h8:"SOLDE FINAL", oq:"Trimestriel", om_div:"Mensuel", od_on:"ACTIVÉ", od_off:"ESPÈCES" },
        de: { p:"Kurs", s:"Aktien", y:"Rendite %", a:"Jahre", dg:"Div-Wachstum %", pg:"Kurs-Wachstum %", c:"Beitrag", t:"Steuer %", df:"Zinseszins", dr:"Strategie", bc:"ANALYSE ERSTELLEN", md:"PROGNOSE", mc:"ZINSESZINS", ti:"Investiert", dn:"Dividenden", ap:"Zuwachs", tx:"Steuern", rf:"SCHÄTZWERT", init:"STARTKAPITAL:", cp:"Anfangskapital", cm:"Monatl. Beitrag", cr:"Zinsatz %", ct:"Steuer %", ca:"Jahre", cf:"Zinseszins", b2:"BERECHNEN", cf1:"GESCHÄTZTER NETTOSALDO", om:"Monatlich", oy:"Jährlich", h1:"JAHR", h2:"AKTIEN", h3:"DIV/AKTIE", h4:"DIV. JÄHRL.", h5:"REINVESTIERT", h6:"BEITRAG", h7:"ENDPREIS", h8:"ENDSALDO", oq:"Quartalsweise", om_div:"Monatlich", od_on:"AKTIVIERT", od_off:"AUSZAHLUNG" },
        cn: { p:"股价", s:"持股量", y:"股息率 %", a:"年数", dg:"股息增长 %", pg:"股价增长 %", c:"年投入", t:"税率 %", df:"频率", dr: "策略", bc:"生成分析", md:"项目预测", mc:"复利计算", ti:"总投入", dn:"净股息", ap:"市值增值", tx:"总税收", rf:"预估总值", init:"初始投资:", cp:"初始存款", cm: "每月投入", cr:"利率 %", ct:"税率 %", ca:"年数", cf:"复利频率", b2:"计算", cf1:"预估最终净余额", om:"每月", oy:"每年", h1:"年份", h2:"持股", h3:"每股股息", h4:"年度股息", h5:"再投资", h6:"投入", h7:"最终价格", h8:"最终余额", oq:"每季度", om_div:"每月", od_on:"开启", od_off:"现金" }
    };
    const t = map[l];
    // Traduceri
    document.getElementById('l_p').innerText = t.p; document.getElementById('l_s').innerText = t.s;
    document.getElementById('l_y').innerText = t.y; document.getElementById('l_a').innerText = t.a;
    document.getElementById('l_dg').innerText = t.dg; document.getElementById('l_pg').innerText = t.pg;
    document.getElementById('l_c').innerText = t.c; document.getElementById('l_t').innerText = t.t;
    document.getElementById('l_df').innerText = t.df; document.getElementById('l_dr').innerText = t.dr;
    document.getElementById('b_calc').innerText = t.bc; document.getElementById('m_div').innerText = t.md;
    document.getElementById('l_tinv').innerText = t.ti; document.getElementById('l_tdiv').innerText = t.dn;
    document.getElementById('l_tpg').innerText = t.ap; document.getElementById('l_ttax').innerText = t.tx;
    document.getElementById('l_res_final').innerText = t.rf; document.getElementById('l_init').innerText = t.init;
    document.getElementById('h1').innerText = t.h1; document.getElementById('h2').innerText = t.h2;
    document.getElementById('h3').innerText = t.h3; document.getElementById('h4').innerText = t.h4;
    document.getElementById('h5').innerText = t.h5; document.getElementById('h6').innerText = t.h6;
    document.getElementById('h7').innerText = t.h7; document.getElementById('h8').innerText = t.h8;
    document.getElementById('o_q').innerText = t.oq; document.getElementById('o_m').innerText = t.om_div;
    document.getElementById('o_don').innerText = t.od_on; document.getElementById('o_doff').innerText = t.od_off;
    document.getElementById('l_cp').innerText = t.cp; document.getElementById('l_cm').innerText = t.cm;
    document.getElementById('l_cr').innerText = t.cr; document.getElementById('l_ct').innerText = t.ct;
    document.getElementById('l_ca').innerText = t.ca; document.getElementById('l_cf').innerText = t.cf;
    document.getElementById('b_calc2').innerText = t.b2; document.getElementById('l_cfinal').innerText = t.cf1;
    document.getElementById('m_comp').innerText = t.mc; document.getElementById('opt_m').innerText = t.om; document.getElementById('opt_y').innerText = t.oy;
}
</script>
</body>
</html>
