<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DiviTracker Pro Global</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #121212; --accent: #34c759; --text: #fff; --muted: #8e8e93; --border: #2c2c2e; --blue: #007aff; --red: #ff3b30; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        
        .header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .lang-select { background: #1e1e1e; color: #fff; border: 1px solid var(--border); padding: 5px; border-radius: 5px; font-size: 14px; outline: none; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; display: none; }
        .container.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        input { background: #1e1e1e; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--blue); }

        .btn-calc { background: var(--accent); color: #000; font-weight: 800; padding: 15px; border: none; border-radius: 10px; width: 100%; font-size: 16px; cursor: pointer; }
        .btn-reset { background: none; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-size: 11px; font-weight: bold; cursor: pointer; }

        .res-box { display: none; margin-top: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chart-container { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 10px; margin-bottom: 15px; height: 220px; }
        
        .summary-item { background: #1c1c1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .val-big { font-size: 26px; font-weight: 900; color: var(--accent); }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #121212; border-top: 1px solid var(--border); display: flex; z-index: 1000; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); font-size: 10px; font-weight: bold; cursor: pointer; }
        .tab-item.active { color: var(--accent); }
        .tab-icon { font-size: 20px; margin-bottom: 4px; }

        .table-wrap { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
        th { background: #161616; color: var(--muted); font-size: 9px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800;">Divi<span style="color:var(--accent)">Tracker</span> Pro</div>
        <select class="lang-select" id="lang_switcher" onchange="changeLanguage(this.value)">
            <option value="en">🇺🇸 EN</option>
            <option value="ro">🇷🇴 RO</option>
            <option value="es">🇪🇸 ES</option>
            <option value="de">🇩🇪 DE</option>
            <option value="fr">🇫🇷 FR</option>
            <option value="zh">🇨🇳 ZH</option>
        </select>
    </div>

    <div id="div_tab" class="container active">
        <div class="card">
            <div class="grid">
                <div><label id="l_p">Price ($)</label><input type="number" id="p" value="27"></div>
                <div><label id="l_s">Shares</label><input type="number" id="s" value="250"></div>
            </div>
            <div class="grid">
                <div><label id="l_y">Yield (%)</label><input type="number" id="y" value="4"></div>
                <div><label id="l_a">Years</label><input type="number" id="a" value="10"></div>
            </div>
            <div class="grid">
                <div><label id="l_c">Contrib ($)</label><input type="number" id="c" value="1200"></div>
                <div><label id="l_t">Tax (%)</label><input type="number" id="t" value="10"></div>
            </div>
            <button class="btn-calc" id="btn_calc" onclick="calculateDiv()">CALCULATE</button>
            <button class="btn-reset" id="btn_reset" onclick="forceReset()">RESET ALL DATA</button>
        </div>

        <div id="res_box" class="res-box">
            <div class="summary-item">
                <label id="l_vfinal">ESTIMATED FINAL VALUE</label>
                <div class="val-big" id="v_final">$0.00</div>
            </div>

            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>

            <div class="grid">
                <div class="summary-item" style="border-left-color: var(--blue);"><label id="l_vinv">INVESTED</label><div id="v_inv" style="font-weight:bold;">$0</div></div>
                <div class="summary-item" style="border-left-color: #ff9500;"><label id="l_vprof">PROFIT</label><div id="v_profit" style="font-weight:bold;">$0</div></div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead><tr id="table_head"><th>Year</th><th>Shares</th><th>Div/Year</th><th>Value</th></tr></thead>
                    <tbody id="tb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="comp_tab" class="container">
        <div class="card">
            <h3 id="l_ctitle">📈 Compound Interest</h3>
            <label id="l_cp">Initial Deposit ($)</label><input type="number" id="cp" value="10000"><br>
            <label id="l_cm">Monthly ($)</label><input type="number" id="cm" value="200"><br>
            <label id="l_cr">Interest (%)</label><input type="number" id="cr" value="8"><br>
            <label id="l_ca">Years</label><input type="number" id="ca" value="15"><br>
            <button class="btn-calc" id="btn_ccalc" style="background:var(--blue); color:#fff;" onclick="calcComp()">CALCULATE</button>
        </div>
        <div id="c_res_box" class="res-box">
            <div class="summary-item" style="border-left-color:var(--blue);"><label id="l_cf">FINAL AMOUNT</label><div class="val-big" id="cv_f" style="color:var(--blue)">$0</div></div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" id="t_div" onclick="switchTab('div')"><div class="tab-icon">💰</div><div id="tab_div">DIVIDENDS</div></div>
        <div class="tab-item" id="t_comp" onclick="switchTab('comp')"><div class="tab-icon">📈</div><div id="tab_comp">COMPOUND</div></div>
    </nav>

    <script>
        let myChart = null;
        let currentLang = 'en';

        const langData = {
            en: {
                l_p:"Price ($)", l_s:"Shares", l_y:"Yield (%)", l_a:"Years", l_c:"Contrib ($)", l_t:"Tax (%)", btn_calc:"CALCULATE", btn_reset:"RESET ALL DATA",
                l_vfinal:"FINAL VALUE", l_vinv:"INVESTED", l_vprof:"PROFIT", table_head:"<th>Year</th><th>Shares</th><th>Div/Year</th><th>Total</th>",
                l_ctitle:"Compound Interest", l_cp:"Initial ($)", l_cm:"Monthly ($)", l_cr:"Interest (%)", l_ca:"Years", btn_ccalc:"CALCULATE", l_cf:"FINAL AMOUNT",
                tab_div:"DIVIDENDS", tab_comp:"COMPOUND"
            },
            ro: {
                l_p:"Preț ($)", l_s:"Acțiuni", l_y:"Yield (%)", l_a:"Ani", l_c:"Depunere ($)", l_t:"Impozit (%)", btn_calc:"CALCULEAZĂ", btn_reset:"RESETEAZĂ TOT",
                l_vfinal:"VALOARE FINALĂ", l_vinv:"INVESTIT", l_vprof:"PROFIT", table_head:"<th>An</th><th>Acțiuni</th><th>Div/An</th><th>Total</th>",
                l_ctitle:"Dobândă Compusă", l_cp:"Suma Inițială", l_cm:"Depunere Lunară", l_cr:"Dobândă (%)", l_ca:"Ani", btn_ccalc:"CALCULEAZĂ", l_cf:"SUMA FINALĂ",
                tab_div:"DIVIDENDE", tab_comp:"DOBÂNDĂ"
            },
            es: { l_p:"Precio", l_s:"Acciones", l_y:"Rendimiento", l_a:"Años", l_c:"Contrib", l_t:"Impuesto", btn_calc:"CALCULAR", btn_reset:"REINICIAR", l_vfinal:"VALOR FINAL", l_vinv:"INVERTIDO", l_vprof:"GANANCIA", table_head:"<th>Año</th><th>Acciones</th><th>Div/Año</th><th>Total</th>", l_ctitle:"Interés Compuesto", l_cp:"Inicial", l_cm:"Mensual", l_cr:"Interés", l_ca:"Años", btn_ccalc:"CALCULAR", l_cf:"MONTO FINAL", tab_div:"DIVIDENDOS", tab_comp:"INTERÉS" },
            de: { l_p:"Preis", l_s:"Aktien", l_y:"Rendite", l_a:"Jahre", l_c:"Beitrag", l_t:"Steuer", btn_calc:"BERECHNEN", btn_reset:"ZURÜCKSETZEN", l_vfinal:"ENDWERT", l_vinv:"INVESTIERT", l_vprof:"GEWINN", table_head:"<th>Jahr</th><th>Aktien</th><th>Div/Jahr</th><th>Gesamt</th>", l_ctitle:"Zinseszins", l_cp:"Startkapital", l_cm:"Monatlich", l_cr:"Zinsatz", l_ca:"Jahre", btn_ccalc:"BERECHNEN", l_cf:"ENDBETRAG", tab_div:"DIVIDENDEN", tab_comp:"ZINSEN" },
            fr: { l_p:"Prix", l_s:"Actions", l_y:"Rendement", l_a:"Années", l_c:"Contrib", l_t:"Impôt", btn_calc:"CALCULER", btn_reset:"RÉINITIALISER", l_vfinal:"VALEUR FINALE", l_vinv:"INVESTI", l_vprof:"PROFIT", table_head:"<th>Année</th><th>Actions</th><th>Div/An</th><th>Total</th>", l_ctitle:"Intérêts Composés", l_cp:"Initial", l_cm:"Mensuel", l_cr:"Intérêt", l_ca:"Années", btn_ccalc:"CALCULER", l_cf:"MONTANT FINAL", tab_div:"DIVIDENDES", tab_comp:"INTÉRÊTS" },
            zh: { l_p:"价格", l_s:"股数", l_y:"股息率", l_a:"年数", l_c:"投入", l_t:"税率", btn_calc:"计算", btn_reset:"重置", l_vfinal:"最终价值", l_vinv:"总投入", l_vprof:"总利润", table_head:"<th>年份</th><th>股数</th><th>年度股息</th><th>总价值</th>", l_ctitle:"复利计算", l_cp:"初始存款", l_cm:"每月投入", l_cr:"年利率", l_ca:"年数", btn_ccalc:"计算", l_cf:"最终金额", tab_div:"股息", tab_comp:"复利" }
        };

        function changeLanguage(lang) {
            currentLang = lang; const d = langData[lang];
            for (let id in d) { 
                const el = document.getElementById(id); 
                if(el) { if(id === 'table_head') el.innerHTML = d[id]; else el.innerText = d[id]; }
            }
            localStorage.setItem('divi_lang', lang);
        }

        function switchTab(t) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(t + '_tab').classList.add('active');
            document.getElementById('t_' + t).classList.add('active');
            window.scrollTo(0,0);
        }

        function forceReset() {
            const def = { p:27, s:250, y:4, a:10, c:1200, t:10, cp:10000, cm:200, cr:8, ca:15 };
            for (let id in def) { document.getElementById(id).value = def[id]; }
            document.getElementById('res_box').style.display = 'none';
            document.getElementById('c_res_box').style.display = 'none';
            if(myChart) { myChart.destroy(); myChart = null; }
            window.scrollTo(0,0);
        }

        function calculateDiv() {
            const p = parseFloat(document.getElementById('p').value) || 0;
            const s = parseFloat(document.getElementById('s').value) || 0;
            const y = (parseFloat(document.getElementById('y').value) || 0) / 100;
            const a = parseInt(document.getElementById('a').value) || 1;
            const c = parseFloat(document.getElementById('c').value) || 0;
            const t = (parseFloat(document.getElementById('t').value) || 0) / 100;

            let curS = s, inv = p * s, html = '', labels = [], dataVal = [];

            for(let i=1; i<=a; i++) {
                inv += c;
                curS += (c / p);
                let divNet = (curS * p * y) * (1 - t);
                curS += (divNet / p);
                let val = curS * p;
                
                labels.push(i); dataVal.push(val.toFixed(0));
                html += `<tr><td>${i}</td><td>${curS.toFixed(2)}</td><td>$${(curS*p*y).toFixed(2)}</td><td>$${val.toLocaleString()}</td></tr>`;
            }

            document.getElementById('tb').innerHTML = html;
            document.getElementById('v_final').innerText = "$" + (curS * p).toLocaleString();
            document.getElementById('v_inv').innerText = "$" + inv.toLocaleString();
            document.getElementById('v_profit').innerText = "$" + ((curS * p) - inv).toLocaleString();
            document.getElementById('res_box').style.display = 'block';

            if(myChart) myChart.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Value', data: dataVal, borderColor: '#34c759', backgroundColor: 'rgba(52, 199, 89, 0.1)', fill: true, tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#8e8e93' }, grid: { color: '#2c2c2e' } }, x: { ticks: { color: '#8e8e93' }, grid: { display: false } } } }
            });
        }

        function calcComp() {
            let p = parseFloat(document.getElementById('cp').value) || 0, m = parseFloat(document.getElementById('cm').value) || 0;
            let r = (parseFloat(document.getElementById('cr').value) || 0) / 100 / 12, a = (parseInt(document.getElementById('ca').value) || 1) * 12;
            let res = (r === 0) ? p + (m * a) : p * Math.pow(1+r, a) + m * (Math.pow(1+r, a) - 1) / r;
            document.getElementById('cv_f').innerText = '$' + res.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('c_res_box').style.display = 'block';
        }

        window.onload = () => {
            const saved = localStorage.getItem('divi_lang') || 'en';
            document.getElementById('lang_switcher').value = saved;
            changeLanguage(saved);
        };
    </script>
</body>
</html>
