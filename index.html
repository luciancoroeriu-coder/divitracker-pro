<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>DiviTracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --stone: #2a2a2a;
            --neon-green: #34c759;
            --neon-blue: #007aff;
            --gold: #d4af37;
            --bg: radial-gradient(circle, #333 1px, transparent 1px), #1a1a1a;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            background-size: 20px 20px;
            color: #eee; margin: 0; padding-bottom: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            padding: 55px 20px 15px;
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border-bottom: 2px solid #444;
            display: flex; justify-content: space-between; align-items: center;
        }

        .container { padding: 15px; max-width: 850px; margin: 0 auto; display: none; }
        .container.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: #2a2a2a; border-radius: 16px; padding: 20px; margin-bottom: 20px;
            box-shadow: inset 2px 2px 5px #111, inset -1px -1px 3px #444, 8px 8px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 900; display: block; margin-bottom: 4px; }
        
        input, select {
            background: #181818; color: var(--gold); border: none; padding: 12px;
            border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box;
            box-shadow: inset 3px 3px 6px #000, inset -1px -1px 3px #333; outline: none; font-weight: bold;
        }

        .btn-calc {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a); color: var(--neon-green);
            font-weight: 900; padding: 18px; border: 2px solid var(--neon-green);
            border-radius: 12px; width: 100%; text-transform: uppercase;
            box-shadow: 0 0 10px rgba(52, 199, 89, 0.3); margin-top: 10px; cursor: pointer;
        }

        .res-box {
            border: 2px solid var(--neon-green); background: rgba(0,0,0,0.4);
            border-radius: 15px; padding: 20px; text-align: center; margin: 20px 0;
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .summary-item { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; }

        .table-wrap { overflow-x: auto; background: #111; border-radius: 12px; border: 1px solid #333; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 800px; }
        th { background: #222; color: #777; padding: 12px; border-bottom: 2px solid #333; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #222; color: #bbb; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111; display: flex; border-top: 1px solid #333; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-weight: 800; }
        .tab-item.active { color: var(--neon-green); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; font-size: 20px;">DIVITRACKER <span style="color:var(--neon-green)">PRO</span></div>
    <select id="lang" style="width: auto; padding: 5px; border-radius: 10px;" onchange="updateLang()">
        <option value="ro">🇷🇴 RO</option><option value="en" selected>🇺🇸 EN</option>
        <option value="es">🇪🇸 ES</option><option value="fr">🇫🇷 FR</option>
        <option value="de">🇩🇪 DE</option><option value="cn">🇨🇳 CN</option>
    </select>
</div>

<div id="div_tab" class="container">
    <div class="card">
        <div class="grid">
            <div><label id="l_p">Price</label><input type="number" id="p" value="100" oninput="liveSum()"></div>
            <div><label id="l_s">Shares</label><input type="number" id="s" value="250" oninput="liveSum()"></div>
        </div>
        <div style="text-align:center; margin-bottom:15px; font-size:12px; color:#888;">
            <span id="l_init">INITIAL INVESTMENT:</span> <span id="cur_init" style="color:var(--neon-green); font-size: 16px;">$25.000</span>
        </div>
        <div class="grid">
            <div><label id="l_y">Annual Yield %</label><input type="number" id="y" value="4.4" step="0.1"></div>
            <div><label id="l_a">Years</label><input type="number" id="a" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_dg">Div Growth %</label><input type="number" id="dg" value="5"></div>
            <div><label id="l_pg">Price Growth %</label><input type="number" id="pg" value="7"></div>
        </div>
        <div class="grid">
            <div><label id="l_c">Annual Contribution</label><input type="number" id="c" value="1200"></div>
            <div><label id="l_t">Div Tax %</label><input type="number" id="t" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_df">Compounding</label>
                <select id="dfreq"><option value="4">Quarterly (4x)</option><option value="12">Monthly (12x)</option></select>
            </div>
            <div><label id="l_dr">Strategy</label>
                <select id="drip"><option value="yes">DRIP ON</option><option value="no">CASH OUT</option></select>
            </div>
        </div>
        <button class="btn-calc" id="b_calc" onclick="calcDiv()">GENERATE ANALYSIS</button>
    </div>
    <div id="res_div" style="display:none;">
        <div class="res-box">
            <label id="l_res_final">ESTIMATED PORTFOLIO VALUE</label>
            <div id="v_final" style="font-size:32px; font-weight:900; color:var(--neon-green);">$0</div>
            <div class="summary-grid">
                <div class="summary-item"><label id="l_tinv">Invested</label><div id="v_total_inv">$0</div></div>
                <div class="summary-item"><label id="l_tdiv">Net Dividends</label><div id="v_total_div" style="color:var(--neon-green);">$0</div></div>
                <div class="summary-item"><label id="l_tpg">Appreciation</label><div id="v_total_pg">$0</div></div>
                <div class="summary-item"><label id="l_ttax">Taxes</label><div id="v_total_tax" style="color:#ff3b30;">$0</div></div>
            </div>
        </div>
        <div class="table-wrap"><table><tbody id="tb_div"></tbody></table></div>
        <div class="chart-wrap"><canvas id="cDiv"></canvas></div>
    </div>
</div>

<div id="comp_tab" class="container active">
    <div class="card">
        <label id="l_cp">Initial Deposit</label><input type="number" id="cp" value="10000">
        <br>
        <label id="l_cm">Monthly Contribution</label><input type="number" id="cm" value="500">
        <br>
        <div class="grid">
            <div><label id="l_cr">Interest %</label><input type="number" id="cr" value="8"></div>
            <div><label id="l_ct">Profit Tax %</label><input type="number" id="ct" value="10"></div>
        </div>
        <div class="grid">
            <div><label id="l_ca">Years</label><input type="number" id="ca" value="15"></div>
            <div><label id="l_cf">Compounding</label>
                <select id="cfreq"><option value="12" selected>Monthly (Compound)</option><option value="1">Yearly (Simple)</option></select>
            </div>
        </div>
        <button class="btn-calc" style="color:var(--neon-blue); border-color:var(--neon-blue);" id="b_calc2" onclick="calcComp()">CALCULATE</button>
    </div>
    <div id="res_comp" style="display:none;">
        <div class="res-box" style="border-color:var(--neon-blue);">
            <label id="l_cfinal">ESTIMATED FINAL NET BALANCE</label>
            <div id="cv_final" style="font-size:32px; font-weight:900; color:var(--neon-blue);">$0</div>
        </div>
        <div class="chart-wrap"><canvas id="cComp"></canvas></div>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item" onclick="tab('div', this)"><span>💰</span><div id="m_div">PROJECTIONS</div></div>
    <div class="tab-item active" onclick="tab('comp', this)"><span>📈</span><div id="m_comp">COMPOUND</div></div>
</nav>

<script>
let dChart = null, cChart = null;
function tab(t, el) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    document.getElementById(t+'_tab').classList.add('active');
    el.classList.add('active');
}
function liveSum() {
    let p = document.getElementById('p').value, s = document.getElementById('s').value;
    document.getElementById('cur_init').innerText = "$" + Math.round(p * s).toLocaleString();
}
function calcDiv() {
    let p = parseFloat(document.getElementById('p').value), s = parseFloat(document.getElementById('s').value);
    let y = parseFloat(document.getElementById('y').value)/100, a = parseInt(document.getElementById('a').value);
    let dg = parseFloat(document.getElementById('dg').value)/100, pg = parseFloat(document.getElementById('pg').value)/100;
    let c = parseFloat(document.getElementById('c').value), t = parseFloat(document.getElementById('t').value)/100;
    let df = parseInt(document.getElementById('dfreq').value), drip = document.getElementById('drip').value === 'yes';
    let curS = s, curP = p, dps = p * y, labs = [], vals = [], totInv = p * s, totDivNet = 0, totTax = 0, dripC = 0, html = '';
    for(let i=1; i<=a; i++) {
        let annB = 0;
        for(let f=0; f<df; f++) {
            let pD = (curS * (dps / df)); annB += pD; let net = pD * (1 - t); totTax += (pD * t);
            if(drip) { curS += (net / curP); dripC += net; }
        }
        curS += (c / curP); totInv += c; totDivNet += (annB * (1 - t)); curP *= (1 + pg); dps *= (1 + dg);
        let bal = curS * curP; labs.push(i); vals.push(Math.round(bal));
        html += `<tr><td>${i}</td><td>${curS.toFixed(2)}</td><td>$${dps.toFixed(2)}</td><td>$${Math.round(annB).toLocaleString()}</td><td>$${Math.round(dripC).toLocaleString()}</td><td>$${c.toLocaleString()}</td><td>$${curP.toFixed(2)}</td><td style="color:var(--neon-green);font-weight:bold;">$${Math.round(bal).toLocaleString()}</td></tr>`;
    }
    document.getElementById('tb_div').innerHTML = html;
    document.getElementById('v_final').innerText = "$" + Math.round(vals[a-1]).toLocaleString();
    document.getElementById('v_total_inv').innerText = "$" + Math.round(totInv).toLocaleString();
    document.getElementById('v_total_div').innerText = "$" + Math.round(totDivNet).toLocaleString();
    document.getElementById('v_total_pg').innerText = "$" + Math.round(vals[a-1] - totInv - totDivNet).toLocaleString();
    document.getElementById('v_total_tax').innerText = "$" + Math.round(totTax).toLocaleString();
    document.getElementById('res_div').style.display = 'block';
    if(dChart) dChart.destroy();
    dChart = new Chart(document.getElementById('cDiv'), { type: 'line', data: { labels: labs, datasets: [{ data: vals, borderColor: '#34c759', backgroundColor: 'rgba(52,199,89,0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
}

function calcComp() {
    let p = parseFloat(document.getElementById('cp').value), m = parseFloat(document.getElementById('cm').value);
    let r = parseFloat(document.getElementById('cr').value)/100, tax = parseFloat(document.getElementById('ct').value)/100;
    let ani = parseInt(document.getElementById('ca').value), freq = parseInt(document.getElementById('cfreq').value);
    let labs = [], dDep = [], dMth = [], dProf = [], cur = p, inv = p, pBrut = 0;
    for(let i=1; i<=ani; i++) {
        let sAn = cur;
        for(let j=0; j<12; j++) { cur += m; inv += m; if(freq === 12) cur *= Math.pow(1 + r, 1/12); }
        if(freq === 1) cur *= (1 + r);
        pBrut += (cur - sAn - (m * 12)); labs.push(2026+i); dDep.push(p); dMth.push(inv-p); dProf.push(Math.round(pBrut*(1-tax)));
    }
    document.getElementById('cv_final').innerText = "$" + Math.round(inv + pBrut*(1-tax)).toLocaleString();
    document.getElementById('res_comp').style.display = 'block';
    if(cChart) cChart.destroy();
    cChart = new Chart(document.getElementById('cComp'), { type: 'bar', data: { labels: labs, datasets: [{ label: 'Initial', data: dDep, backgroundColor: '#0d47a1' }, { label: 'Contributions', data: dMth, backgroundColor: '#1976d2' }, { label: 'Profit', data: dProf, backgroundColor: '#34c759' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } } });
}

function updateLang() {
    const l = document.getElementById('lang').value;
    const map = {
        ro: { p:"Preț", s:"Acțiuni", y:"Yield Anual %", a:"Ani", dg:"Creșt. Div %", pg:"Creșt. Preț %", c:"Contrib. Anuală", t:"Impozit Div %", df:"Compunere", dr:"Reinvestire", bc:"GENEREAZĂ ANALIZA", md:"PROIECȚII", mc:"DOBÂNDĂ", ti:"Investit", dn:"Profit Dividende", ap:"Apreciere", tx:"Taxe", rf:"VALOARE ESTIMATĂ", init:"INVESTIȚIE INIȚIALĂ:", cp:"Depozit Inițial", cm:"Depunere Lunară", cr:"Dobândă %", ct:"Impozit Profit %", ca:"Ani", cf:"Compunere", b2:"CALCULEAZĂ", cf1:"BALANȚĂ NETĂ FINALĂ" },
        en: { p:"Price", s:"Shares", y:"Annual Yield %", a:"Years", dg:"Div Growth %", pg:"Price Growth %", c:"Annual Contrib.", t:"Div Tax %", df:"Compounding", dr:"Strategy", bc:"GENERATE ANALYSIS", md:"PROJECTIONS", mc:"COMPOUND", ti:"Invested", dn:"Net Dividends", ap:"Appreciation", tx:"Taxes", rf:"ESTIMATED VALUE", init:"INITIAL INVESTMENT:", cp:"Initial Deposit", cm:"Monthly Contribution", cr:"Interest %", ct:"Profit Tax %", ca:"Years", cf:"Compounding", b2:"CALCULATE", cf1:"ESTIMATED FINAL NET BALANCE" },
        es: { p:"Precio", s:"Acciones", y:"Rendimiento %", a:"Años", dg:"Crec. Div %", pg:"Crec. Precio %", c:"Contribución", t:"Impuesto %", df:"Compuesto", dr:"Estrategia", bc:"GENERAR ANÁLISIS", md:"PROYECCIONES", mc:"INTERÉS", ti:"Invertido", dn:"Dividendos", ap:"Plusvalía", tx:"Impuestos", rf:"VALOR ESTIMADO", init:"INVERSIÓN INICIAL:", cp:"Depósito Inicial", cm:"Contribución Mensual", cr:"Interés %", ct:"Impuesto %", ca:"Años", cf:"Compuesto", b2:"CALCULAR", cf1:"BALANCE NETO FINAL" },
        fr: { p:"Prix", s:"Actions", y:"Rendement %", a:"Années", dg:"Croiss. Div %", pg:"Croiss. Prix %", c:"Contrib. Annuelle", t:"Impôt %", df:"Composition", dr:"Stratégie", bc:"GÉNÉRER ANALYSE", md:"PROJECTIONS", mc:"INTÉRÊT", ti:"Investi", dn:"Dividendes", ap:"Plus-value", tx:"Impôts", rf:"VALEUR ESTIMÉE", init:"INVESTISSEMENT INITIAL:", cp:"Dépôt Initial", cm:"Contribution Mensuelle", cr:"Intérêt %", ct:"Impôt %", ca:"Années", cf:"Composition", b2:"CALCULER", cf1:"SOLDE NET FINAL ESTIMÉ" },
        de: { p:"Kurs", s:"Aktien", y:"Rendite %", a:"Jahre", dg:"Div-Wachstum %", pg:"Kurs-Wachstum %", c:"Beitrag", t:"Steuer %", df:"Zinseszins", dr:"Strategie", bc:"ANALYSE ERSTELLEN", md:"PROGNOSE", mc:"ZINSESZINS", ti:"Investiert", dn:"Dividenden", ap:"Zuwachs", tx:"Steuern", rf:"SCHÄTZWERT", init:"STARTKAPITAL:", cp:"Anfangskapital", cm:"Monatl. Beitrag", cr:"Zinsatz %", ct:"Steuer %", ca:"Jahre", cf:"Zinseszins", b2:"BERECHNEN", cf1:"GESCHÄTZTER NETTOSALDO" },
        cn: { p:"股价", s:"持股量", y:"股息率 %", a:"年数", dg: "股息增长 %", pg: "股价增长 %", c: "年投入", t: "税率 %", df: "频率", dr: "策略", bc: "生成分析", md: "项目预测", mc: "复利计算", ti: "总投入", dn: "净股息", ap: "市值增值", tx: "总税收", rf: "预估总值", init: "初始投资:", cp: "初始存款", cm: "每月投入", cr: "利率 %", ct: "税率 %", ca: "年数", cf: "复利频率", b2: "计算", cf1: "预估最终净余额" }
    };
    const t = map[l];
    document.getElementById('l_p').innerText = t.p; document.getElementById('l_s').innerText = t.s;
    document.getElementById('l_y').innerText = t.y; document.getElementById('l_a').innerText = t.a;
    document.getElementById('l_dg').innerText = t.dg; document.getElementById('l_pg').innerText = t.pg;
    document.getElementById('l_c').innerText = t.c; document.getElementById('l_t').innerText = t.t;
    document.getElementById('l_df').innerText = t.df; document.getElementById('l_dr').innerText = t.dr;
    document.getElementById('b_calc').innerText = t.bc; document.getElementById('m_div').innerText = t.md;
    document.getElementById('m_comp').innerText = t.mc; document.getElementById('l_tinv').innerText = t.ti;
    document.getElementById('l_tdiv').innerText = t.dn; document.getElementById('l_tpg').innerText = t.ap;
    document.getElementById('l_ttax').innerText = t.tx; document.getElementById('l_res_final').innerText = t.rf;
    document.getElementById('l_init').innerText = t.init;
    // Traduceri Tab 2 (DOBÂNDĂ) - FIRELE PE CARE LE-AM UITAT:
    document.getElementById('l_cp').innerText = t.cp; document.getElementById('l_cm').innerText = t.cm;
    document.getElementById('l_cr').innerText = t.cr; document.getElementById('l_ct').innerText = t.ct;
    document.getElementById('l_ca').innerText = t.ca; document.getElementById('l_cf').innerText = t.cf;
    document.getElementById('b_calc2').innerText = t.b2; document.getElementById('l_cfinal').innerText = t.cf1;
}
</script>
</body>
</html>
