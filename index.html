<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DiviTracker Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background-color: #f2f2f7; color: #1c1c1e;
        }
        .header { background-color: #fff; padding: 20px 15px 15px; text-align: center; font-size: 22px; font-weight: 800; border-bottom: 1px solid #e5e5ea; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #8e8e93; font-weight: 600; font-size: 15px; }
        .tab.active { color: #007aff; border-bottom: 3px solid #007aff; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        label { display: block; font-size: 13px; color: #6c6c70; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        input[type="number"] { width: 100%; padding: 12px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 17px; box-sizing: border-box; margin-bottom: 15px; background-color: #fafafa; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 20px; font-size: 16px; font-weight: 500; }
        .checkbox-group input { width: 24px; height: 24px; margin-right: 12px; accent-color: #007aff; }
        button { background-color: #007aff; color: #fff; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        button:active { background-color: #005bb5; }
        .results { margin-top: 20px; display: none; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 16px; }
        .highlight { font-size: 20px; font-weight: 800; color: #34c759; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { text-align: right; padding: 10px 5px; border-bottom: 1px solid #e5e5ea; }
        th { color: #8e8e93; font-weight: 600; font-size: 12px; text-transform: uppercase; }
        th:first-child, td:first-child { text-align: left; }
    </style>
</head>
<body>

    <div class="header">DiviTracker Pro</div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('dividende')">Dividende (TipRanks)</div>
        <div class="tab" onclick="switchTab('dobanda')">Dobândă Compusă</div>
    </div>

    <div id="dividende" class="content active">
        <div class="card">
            <label>Suma de început ($ / € / RON)</label>
            <input type="number" id="div_principal" value="10000">

            <label>Depunere anuală ($ / € / RON)</label>
            <input type="number" id="div_annual" value="1200">

            <label>Număr de ani</label>
            <input type="number" id="div_years" value="10">

            <label>Creșterea anuală a acțiunii (%)</label>
            <input type="number" id="div_growth" value="7">

            <label>Randament Dividend Yield (%)</label>
            <input type="number" id="div_yield" value="4">
            
            <label>Preț inițial acțiune (Opțional - pt calcul bucăți)</label>
            <input type="number" id="div_price" value="100">

            <div class="checkbox-group">
                <input type="checkbox" id="div_drip" checked>
                <label for="div_drip" style="margin:0; text-transform:none; font-size: 16px; color:#1c1c1e;">Activează DRIP (Reinvestire Dividende)</label>
            </div>

            <button onclick="calculateDividends()">Calculează Portofoliul</button>
        </div>

        <div class="card results" id="div_results">
            <div class="result-row"><span>Valoare Totală Portofoliu:</span> <span class="highlight" id="res_portfolio">0</span></div>
            <div class="result-row"><span>Total Dividende Încasate:</span> <span class="highlight" style="color:#007aff;" id="res_total_div">0</span></div>
            <div class="result-row"><span>Număr Total Acțiuni:</span> <span id="res_shares" style="font-weight:bold;">0</span></div>
            
            <table>
                <thead>
                    <tr>
                        <th>An</th>
                        <th>Val. Portofoliu</th>
                        <th>Div. Anual</th>
                        <th>Acțiuni</th>
                    </tr>
                </thead>
                <tbody id="div_table_body">
                </tbody>
            </table>
        </div>
    </div>

    <div id="dobanda" class="content">
        <div class="card">
            <p style="color: #8e8e93; font-size: 14px;">Acesta este modulul standard pentru dobândă, fără calcul de acțiuni.</p>
            <label>Suma Inițială</label>
            <input type="number" id="comp_principal" value="5000">
            <label>Contribuție Lunara</label>
            <input type="number" id="comp_monthly" value="200">
            <label>Dobândă Anuală (%)</label>
            <input type="number" id="comp_rate" value="8">
            <label>Perioadă (Ani)</label>
            <input type="number" id="comp_years" value="15">
            <button onclick="calculateCompound()">Calculează Dobânda</button>
        </div>
        <div class="card results" id="comp_results">
            <div class="result-row"><span>Suma Finală:</span> <span class="highlight" id="res_comp_total">0</span></div>
            <div class="result-row"><span>Total Investit:</span> <span id="res_comp_invested" style="font-weight:bold;">0</span></div>
            <div class="result-row"><span>Profit din Dobândă:</span> <span id="res_comp_profit" style="color:#007aff; font-weight:bold;">0</span></div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function formatCurrency(num) {
            return num.toLocaleString('ro-RO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calculateDividends() {
            let principal = parseFloat(document.getElementById('div_principal').value);
            let annualContribution = parseFloat(document.getElementById('div_annual').value);
            let years = parseInt(document.getElementById('div_years').value);
            let growthRate = parseFloat(document.getElementById('div_growth').value) / 100;
            let divYield = parseFloat(document.getElementById('div_yield').value) / 100;
            let initialPrice = parseFloat(document.getElementById('div_price').value) || 100;
            let isDrip = document.getElementById('div_drip').checked;

            let currentPrice = initialPrice;
            let currentShares = principal / currentPrice;
            let totalDividendsCollected = 0; // AICI strângem suma TOTALĂ corectă

            let tbody = document.getElementById('div_table_body');
            tbody.innerHTML = '';

            for (let y = 1; y <= years; y++) {
                // 1. Adăugăm contribuția anuală la începutul anului
                currentShares += annualContribution / currentPrice;

                // 2. Acțiunea crește în valoare pe parcursul anului
                currentPrice = currentPrice * (1 + growthRate);

                // 3. Calculăm dividendul primit în acest an pe baza noii valori
                let currentPortfolioValue = currentShares * currentPrice;
                let yearlyDividend = currentPortfolioValue * divYield;
                
                // Adăugăm la totalul dividendelor încasate vreodată
                totalDividendsCollected += yearlyDividend;

                // 4. Dacă e DRIP, cumpărăm acțiuni noi cu dividendul
                if (isDrip) {
                    currentShares += yearlyDividend / currentPrice;
                    currentPortfolioValue = currentShares * currentPrice; // recalculăm
                }

                // Valoarea reală a portofoliului dacă NU e DRIP = Valoarea acțiunilor + Cash-ul adunat din dividende
                let displayPortfolioValue = isDrip ? currentPortfolioValue : (currentPortfolioValue + totalDividendsCollected);

                // Adăugăm rândul în tabel
                let row = `<tr>
                    <td style="text-align:left; font-weight:bold;">An ${y}</td>
                    <td>${formatCurrency(displayPortfolioValue)}</td>
                    <td style="color:#007aff;">+${formatCurrency(yearlyDividend)}</td>
                    <td>${formatCurrency(currentShares)}</td>
                </tr>`;
                tbody.innerHTML += row;
            }

            // Calcul final pentru ecran
            let finalPortfolioValue = currentShares * currentPrice;
            if (!isDrip) finalPortfolioValue += totalDividendsCollected;

            document.getElementById('res_portfolio').innerText = formatCurrency(finalPortfolioValue);
            document.getElementById('res_total_div').innerText = formatCurrency(totalDividendsCollected);
            document.getElementById('res_shares').innerText = formatCurrency(currentShares);
            document.getElementById('div_results').style.display = 'block';
        }

        function calculateCompound() {
            let principal = parseFloat(document.getElementById('comp_principal').value);
            let monthly = parseFloat(document.getElementById('comp_monthly').value);
            let rate = parseFloat(document.getElementById('comp_rate').value) / 100;
            let years = parseInt(document.getElementById('comp_years').value);

            let total = principal;
            let totalInvested = principal + (monthly * 12 * years);

            for (let m = 1; m <= years * 12; m++) {
                total += monthly;
                total = total * (1 + rate/12);
            }

            document.getElementById('res_comp_total').innerText = formatCurrency(total);
            document.getElementById('res_comp_invested').innerText = formatCurrency(totalInvested);
            document.getElementById('res_comp_profit').innerText = formatCurrency(total - totalInvested);
            document.getElementById('comp_results').style.display = 'block';
        }
    </script>
</body>
</html>
