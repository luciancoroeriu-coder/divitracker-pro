<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator Dividende Pro</title>
    <style>
        :root {
            --bg-dark: #0b101e;
            --card-bg: #161b2a;
            --input-bg: #1f2537;
            --text-main: #f8fafc;
            --text-muted: #8b95a5;
            --accent: #1df27d; /* Verde neon */
            --border: #2a3143;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; background-color: var(--bg-dark); color: var(--text-main);
            padding-bottom: 50px;
        }

        .header {
            padding: 20px; font-size: 24px; font-weight: bold; border-bottom: 1px solid var(--border);
        }
        .header span { color: var(--accent); font-style: italic; }

        .container { padding: 15px; }
        .card {
            background-color: var(--card-bg); border-radius: 16px; padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border);
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .input-group { display: flex; flex-direction: column; }
        .input-group label {
            font-size: 11px; color: var(--text-muted); text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px; font-weight: 600;
        }
        
        input, select {
            background-color: var(--input-bg); color: var(--text-main);
            border: 1px solid var(--border); padding: 12px; border-radius: 8px;
            font-size: 16px; outline: none; width: 100%; box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--accent); }

        .drip-toggle {
            display: flex; background: var(--input-bg); border-radius: 8px; overflow: hidden;
            margin-bottom: 20px; border: 1px solid var(--border);
        }
        .drip-btn {
            flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: bold;
            color: var(--text-muted); cursor: pointer; transition: 0.3s;
        }
        .drip-btn.active { background-color: var(--accent); color: #000; }

        .btn-calc {
            background-color: var(--accent); color: #000; font-size: 16px; font-weight: bold;
            padding: 16px; border: none; border-radius: 8px; width: 100%; cursor: pointer;
            box-shadow: 0 4px 15px rgba(29, 242, 125, 0.3);
        }
        .btn-calc:active { opacity: 0.8; }

        .table-container {
            margin-top: 25px; overflow-x: auto; background: var(--card-bg);
            border-radius: 12px; border: 1px solid var(--border); display: none;
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
        th, td { padding: 12px 15px; text-align: right; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 600; background: #1a2033; }
        th:first-child, td:first-child { text-align: center; }
        td { color: var(--text-main); }
        .text-green { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">Calculator <span>Financiar</span></div>

    <div class="container">
        <div class="card">
            <h3 style="margin-top:0; margin-bottom: 20px; font-size: 18px;">💰 Calculator Dividende</h3>
            
            <div class="grid-2">
                <div class="input-group">
                    <label>Preț Acțiune ($)</label>
                    <input type="number" id="in_price" value="100">
                </div>
                <div class="input-group">
                    <label>Nr. Acțiuni</label>
                    <input type="number" id="in_shares" value="100">
                </div>
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <label>Randament Dividend (Yield %)</label>
                <input type="number" id="in_yield" value="5" step="0.1">
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Ani</label>
                    <input type="number" id="in_years" value="10">
                </div>
                <div class="input-group">
                    <label>Frecvență</label>
                    <select id="in_freq">
                        <option value="4">Trimestrială</option>
                        <option value="2">Semianuală</option>
                        <option value="1">Anuală</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Creștere Div. Anual (%)</label>
                    <input type="number" id="in_div_growth" value="5" step="0.1">
                </div>
                <div class="input-group">
                    <label>Creștere Preț Anual (%)</label>
                    <input type="number" id="in_price_growth" value="7" step="0.1">
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Contrib. Anuală ($)</label>
                    <input type="number" id="in_contrib" value="0">
                </div>
                <div class="input-group">
                    <label>Impozit Dividend (%)</label>
                    <input type="number" id="in_tax" value="8" step="0.1">
                </div>
            </div>

            <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; display:block;">Mod DRIP</label>
            <div class="drip-toggle">
                <div class="drip-btn active" id="btn_drip_on" onclick="setDrip(true)">CU DRIP</div>
                <div class="drip-btn" id="btn_drip_off" onclick="setDrip(false)">FĂRĂ DRIP</div>
            </div>

            <button class="btn-calc" onclick="calculate()">CALCULEAZĂ</button>
        </div>

        <div class="table-container" id="results_box">
            <table>
                <thead>
                    <tr>
                        <th>An</th>
                        <th>Acțiuni Deținute</th>
                        <th>Div. Anual / Acțiune</th>
                        <th>Dividend Anual</th>
                        <th>Frecvență</th>
                        <th>Contrib. Anuală</th>
                        <th>Acțiuni Final An</th>
                        <th>Preț Final An</th>
                        <th>Sold Nou (Portofoliu)</th>
                    </tr>
                </thead>
                <tbody id="table_body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let isDripActive = true;

        function setDrip(state) {
            isDripActive = state;
            if(state) {
                document.getElementById('btn_drip_on').classList.add('active');
                document.getElementById('btn_drip_off').classList.remove('active');
            } else {
                document.getElementById('btn_drip_on').classList.remove('active');
                document.getElementById('btn_drip_off').classList.add('active');
            }
        }

        function fmt(num) {
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function calculate() {
            let price = parseFloat(document.getElementById('in_price').value) || 0;
            let shares = parseFloat(document.getElementById('in_shares').value) || 0;
            let yieldPct = parseFloat(document.getElementById('in_yield').value) / 100 || 0;
            let years = parseInt(document.getElementById('in_years').value) || 0;
            
            let freqSelect = document.getElementById('in_freq');
            let freqText = freqSelect.options[freqSelect.selectedIndex].text;
            
            let divGrowth = parseFloat(document.getElementById('in_div_growth').value) / 100 || 0;
            let priceGrowth = parseFloat(document.getElementById('in_price_growth').value) / 100 || 0;
            let contrib = parseFloat(document.getElementById('in_contrib').value) || 0;
            let tax = parseFloat(document.getElementById('in_tax').value) / 100 || 0;

            let currentPrice = price;
            let currentShares = shares;
            let dps = currentPrice * yieldPct; // Dividend per share initial
            let totalCashCollected = 0;

            let tbody = document.getElementById('table_body');
            tbody.innerHTML = '';

            for (let y = 1; y <= years; y++) {
                let startShares = currentShares;
                
                // Calcul dividend bazat pe actiunile de la inceput de an
                let annualDivGross = startShares * dps;
                let annualDivNet = annualDivGross * (1 - tax);

                // Cumparam actiuni din contributia anuala
                let sharesFromContrib = contrib / currentPrice;
                currentShares += sharesFromContrib;

                // Daca avem DRIP, reinvestim dividendul net in actiuni noi
                if (isDripActive) {
                    let sharesFromDrip = annualDivNet / currentPrice;
                    currentShares += sharesFromDrip;
                } else {
                    totalCashCollected += annualDivNet; // Daca nu, strangem banii separat
                }

                // Aprecierea pretului actiunii la final de an
                let endPrice = currentPrice * (1 + priceGrowth);
                let endShares = currentShares;

                // Calcul sold nou
                let newBalance = endShares * endPrice;
                if (!isDripActive) {
                    newBalance += totalCashCollected; // Adaugam cash-ul pus deoparte daca nu e DRIP
                }

                // Generare rand tabel (Identic cu TipRanks)
                let row = `<tr>
                    <td>${y}</td>
                    <td>${fmt(startShares)}</td>
                    <td>$${fmt(dps)}</td>
                    <td class="text-green">$${fmt(annualDivGross)}</td>
                    <td>${freqText}</td>
                    <td>$${fmt(contrib)}</td>
                    <td>${fmt(endShares)}</td>
                    <td>$${fmt(endPrice)}</td>
                    <td style="font-weight:bold;">$${fmt(newBalance)}</td>
                </tr>`;
                
                tbody.innerHTML += row;

                // Setam valorile pentru anul urmator
                currentPrice = endPrice;
                dps = dps * (1 + divGrowth); // Dividendul creste an de an
            }

            document.getElementById('results_box').style.display = 'block';
        }
    </script>
</body>
</html>
